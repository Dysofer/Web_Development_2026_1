<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Your Bear (Dilan Solis & Anny Velasco)</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

<!-- Navbar morado -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom px-4">
  <a class="navbar-brand fw-bold" href="#">Build Your Fashion Bear</a>
</nav>

<!-- Caja de advertencia lila -->
<div class="alert alert-custom text-center fw-bold m-0">
  <i class="bi bi-stars"></i> Personaliza tu oso y guarda tu diseño antes de salir.
</div>

<div class="container my-5">
  <div class="row justify-content-center align-items-center g-5">

    <!-- Oso -->
    <div class="col-md-6 text-center">
      <div class="bear position-relative d-inline-block">
        <img id="bearImage" src="./src/img/teddy.png" width="200" class="img-fluid">
        <img id="hat" class="accessory position-absolute start-50 translate-middle-x" src="src/img/hat.png">
        <img id="glasses" class="accessory position-absolute start-50 translate-middle-x" src="src/img/gafas.png">
        <img id="tie" class="accessory position-absolute start-50 translate-middle-x" src="src/img/tie.png">
        <img id="corbatin" class="accessory position-absolute start-50 translate-middle-x" src="src/img/corbatin.png">
      </div>
    </div>

    <!-- Controles -->
    <div class="col-md-6 text-center">
      <div class="d-grid gap-3">

        <button class="btn btn-primary" onclick="addAccessory('hat')">
          <i class="bi bi-hat"></i> Agregar Sombrero
        </button>

        <button class="btn btn-info text-white" onclick="addAccessory('glasses')">
          <i class="bi bi-eyeglasses"></i> Agregar Gafas
        </button>

        <button class="btn btn-info text-white" onclick="addAccessory('tie')">
          <i class="bi bi-tie"></i> Agregar Corbata
        </button>

        <button class="btn btn-info text-white" onclick="addAccessory('corbatin')">
          <i class="bi bi-tie"></i> Agregar Corbatín
        </button>

        <button class="btn btn-success" onclick="saveBear()">
          <i class="bi bi-save"></i> Guardar Oso
        </button>

        <button class="btn btn-load" onclick="loadBear()">
          <i class="bi bi-folder2-open"></i> Cargar Oso
        </button>

        <button class="btn btn-warning text-dark" data-bs-toggle="modal" data-bs-target="#previewModal">
          <i class="bi bi-eye-fill"></i> Previsualizar Oso
        </button>

        <!-- Precio dinámico -->
        <div class="mt-3">
          <h4 id="priceDisplay">💲 20</h4>
        </div>

        <!-- Botón de checkout -->
        <button class="btn btn-dark" onclick="checkout()">
          <i class="bi bi-cart-check"></i> Checkout
        </button>

      </div>
    </div>
  </div>
</div>

<!-- Modal de previsualización -->
<div class="modal fade" id="previewModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Tu oso personalizado 🧸</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <div class="bear position-relative d-inline-block">
          <img id="bearPreview" src="src/img/teddy.png" width="200">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Checkout -->
<div class="modal fade" id="checkoutModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Resumen de tu compra 🛒</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <!-- Todo dentro del body -->
      <div class="modal-body text-center">
        <div class="bear position-relative d-inline-block mb-3">
          <img id="bearCheckout" src="src/img/teddy.png" class="img-fluid">
        </div>

        <h4>Total: <span id="checkoutTotal">💲 20</span></h4>
        <ul id="checkoutAccessories" class="list-unstyled mt-3"></ul>
      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="confirmPurchase()">Confirmar Compra</button>
      </div>
    </div>
  </div>
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="src/js/main.js"></script>

</body>
</html>
